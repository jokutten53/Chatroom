<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat by Joyal</title>
    <style>
        :root {
            --primary: #0095f6; /* Instagram Blue */
            --bg-color: #fafafa;
            --chat-bg: #ffffff;
            --text-dark: #262626;
            --bubble-other: #efefef;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overscroll-behavior-y: contain;
        }

        .app-container {
            width: 100%; max-width: 500px; height: 100vh;
            background: var(--chat-bg);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- LOGIN SCREEN --- */
        #loginScreen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100%; padding: 2rem; text-align: center; background: white;
        }
        .login-box { width: 100%; max-width: 300px; }
        .login-box h2 { color: var(--text-dark); margin-bottom: 20px; font-weight: 600; }
        
        select, input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border-radius: 8px; border: 1px solid #dbdbdb;
            background: #fafafa; font-size: 1rem; box-sizing: border-box; outline: none;
        }
        input:focus, select:focus { border-color: #a8a8a8; }
        
        .btn-main {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: var(--primary); color: white; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-main:active { opacity: 0.7; }
        
        .divider { margin: 20px 0; color: #8e8e8e; font-size: 0.85rem; font-weight: bold; }
        
        .credit-footer {
            position: absolute; bottom: 20px; font-size: 0.85rem;
            color: #8e8e8e; font-weight: 500; letter-spacing: 1px;
        }
        .credit-footer span { color: var(--primary); font-weight: bold; }

        /* --- CHAT SCREEN --- */
        #chatScreen { display: none; flex-direction: column; height: 100%; }

        header {
            background: white; padding: 15px; display: flex; flex-direction: column;
            border-bottom: 1px solid #dbdbdb; z-index: 10;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .room-title { font-weight: bold; font-size: 1.1rem; color: var(--text-dark); }
        
        .header-buttons button {
            padding: 8px 15px; border-radius: 20px; border: none;
            font-weight: bold; cursor: pointer; font-size: 0.9rem;
        }
        #startCallBtn { background: var(--text-dark); color: white; }
        #answerCallBtn { background: #4cd137; color: white; animation: pulse 1.5s infinite; }
        
        /* Admin Top Bar */
        #adminToolbar {
            display: none; background: #fff3f3; padding: 8px;
            border-radius: 8px; margin-top: 10px; gap: 10px; justify-content: center;
        }
        #adminToolbar button { background: #ff7675; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- INSTA VIDEO CALL UI --- */
        #videoArea {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; flex-direction: column;
        }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo {
            position: absolute; bottom: 100px; right: 20px;
            width: 110px; height: 160px; border-radius: 12px;
            object-fit: cover; border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 101;
        }
        .call-controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 102;
        }
        #hangupBtn {
            background: #ff4757; color: white; width: 60px; height: 60px;
            border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #callStatus {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 5px 15px;
            border-radius: 20px; font-size: 0.9rem; z-index: 103;
        }

        /* --- CHAT BOX --- */
        #chatBox {
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column;
            gap: 10px; background: var(--bg-color);
        }
        
        #typingIndicator { font-size: 0.8rem; color: #8e8e8e; padding: 0 15px 5px; min-height: 15px; }

        .message-wrapper { display: flex; align-items: center; gap: 8px; width: 100%; }
        .message {
            max-width: 75%; padding: 10px 15px; border-radius: 22px;
            font-size: 0.95rem; line-height: 1.4; position: relative; word-wrap: break-word;
        }

        .chat-image { max-width: 100%; border-radius: 12px; margin-bottom: 5px; display: block; }
        .chat-audio { max-width: 200px; height: 35px; margin-bottom: 5px; }

        .msg-sender-name { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #8e8e8e; }
        
        .my-msg-wrapper { justify-content: flex-end; }
        .my-msg { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .my-msg .timestamp { color: rgba(255,255,255,0.7); }

        .other-msg-wrapper { justify-content: flex-start; }
        .other-msg { background: var(--bubble-other); color: var(--text-dark); border-bottom-left-radius: 4px; border: 1px solid #e0e0e0; }

        .timestamp { font-size: 0.65rem; color: #a8a8a8; text-align: right; margin-top: 5px; display: block; }

        /* Delete Options Styling */
        .msg-options {
            display: flex; flex-direction: column; gap: 5px;
            opacity: 0.7; transition: 0.3s; align-items: center;
        }
        .msg-options:hover { opacity: 1; }
        .msg-options button {
            background: none; border: none; cursor: pointer; font-size: 1rem; 
            padding: 0; filter: grayscale(20%); transition: 0.2s;
        }
        .msg-options button:hover { transform: scale(1.2); filter: grayscale(0%); }

        /* --- INPUT AREA --- */
        .input-area {
            display: flex; padding: 10px 15px; background: white;
            border-top: 1px solid #dbdbdb; align-items: center; gap: 10px;
        }
        .action-icon {
            font-size: 1.4rem; cursor: pointer; color: var(--text-dark);
            background: none; border: none; padding: 5px;
        }
        .input-area input[type="text"] {
            flex: 1; padding: 10px 15px; border-radius: 20px;
            border: 1px solid #dbdbdb; outline: none; font-size: 0.95rem; background: #fafafa;
        }
        .input-area input[type="text"]:focus { border-color: #a8a8a8; }
        
        #micBtn { transition: 0.2s transform; user-select: none; -webkit-user-select: none; }
        .recording-active { color: #ff4757 !important; transform: scale(1.3); }

        .send-btn { color: var(--primary); font-weight: bold; background: none; border: none; cursor: pointer; font-size: 1rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Login Screen -->
        <div id="loginScreen">
            <div class="login-box">
                <h2>Chat Room</h2>
                
                <select id="roomSelect">
                    <option value="general">🌍 General Room</option>
                    <option value="family">🏠 Family Room</option>
                    <option value="gaming">🎮 Gaming Room</option>
                </select>

                <input type="text" id="guestName" placeholder="Your Name">
                <button class="btn-main" onclick="joinGuest()">Join Chat</button>
                
                <div class="divider">ADMIN LOGIN</div>
                
                <input type="text" id="adminUser" placeholder="Username">
                <input type="password" id="adminPass" placeholder="Password">
                <button class="btn-main" style="background: var(--text-dark);" onclick="joinAdmin()">Log In</button>
                <p id="loginError" style="color: #ff4757; display: none; font-size: 0.85rem; margin-top: 10px;">Incorrect details</p>
            </div>
            <div class="credit-footer">Made by <span>Joyal</span></div>
        </div>

        <!-- Chat Screen -->
        <div id="chatScreen">
            <header>
                <div class="header-top">
                    <span class="room-title" id="roomTitleDisplay">Room</span>
                    <div class="header-buttons">
                        <button id="startCallBtn" onclick="startCall()">🎥 Video Call</button>
                        <button id="answerCallBtn" onclick="answerCall()" class="hidden">📞 Answer Call</button>
                    </div>
                </div>
                <!-- Admin Tools -->
                <div id="adminToolbar">
                    <span style="font-size:0.8rem; font-weight:bold; color:#ff4757;">Admin Controls:</span>
                    <button onclick="clearAllMessages()">Wipe Chat</button>
                    <button onclick="clearOldMessages()">Del > 1hr</button>
                </div>
            </header>
            
            <!-- Video Overlay -->
            <div id="videoArea">
                <div id="callStatus">Checking camera...</div>
                <video id="remoteVideo" autoplay playsinline></video>
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="call-controls">
                    <button id="hangupBtn" onclick="hangup()">📴</button>
                </div>
            </div>

            <div id="chatBox"></div>
            <div id="typingIndicator"></div>
            
            <div class="input-area">
                <label for="imageUpload" class="action-icon">📷</label>
                <input type="file" id="imageUpload" accept="image/*" class="hidden">
                <button id="micBtn" class="action-icon">🎙️</button>
                <input type="text" id="messageInput" placeholder="Message..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref as dbRef, push, onChildAdded, onChildRemoved, set, get, onValue, remove, update, onDisconnect } 
        from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVKJVGHmoV_h1frjD5AASa_H9BglnVwmw",
            authDomain: "familydictionary6253.firebaseapp.com",
            databaseURL: "https://familydictionary6253-default-rtdb.firebaseio.com",
            projectId: "familydictionary6253",
            storageBucket: "familydictionary6253.firebasestorage.app",
            messagingSenderId: "1051186279461",
            appId: "1:1051186279461:web:808fbc49a821ce51bd7bcc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";
        let isAdmin = false;
        let currentRoom = "";
        let selectedImageBase64 = null;
        let typingTimeout;

        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const micBtn = document.getElementById('micBtn');
        const callStatus = document.getElementById('callStatus');
        
        // --- AUTH & ROOMS ---
        window.joinGuest = () => {
            const input = document.getElementById('guestName').value.trim();
            if (input === "") return alert("Please enter your name!");
            myName = input; isAdmin = false; enterRoom();
        };

        window.joinAdmin = () => {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if (u === 'joyal' && p === '7012') {
                myName = "Joyal"; isAdmin = true;
                document.getElementById('adminToolbar').style.display = "flex";
                enterRoom();
            } else {
                document.getElementById('loginError').style.display = "block";
            }
        };

        function enterRoom() {
            const roomSelector = document.getElementById('roomSelect');
            currentRoom = roomSelector.value;
            document.getElementById('roomTitleDisplay').innerText = roomSelector.options[roomSelector.selectedIndex].text;
            
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('chatScreen').style.display = "flex";
            
            startChatListening();
            listenForCalls();
            listenForTyping();
            onDisconnect(dbRef(db, `rooms/${currentRoom}/typing/${myName}`)).remove();
        }

        // --- TYPING ---
        messageInput.addEventListener('input', () => {
            if (myName === "") return;
            set(dbRef(db, `rooms/${currentRoom}/typing/${myName}`), true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { set(dbRef(db, `rooms/${currentRoom}/typing/${myName}`), false); }, 2500);
        });

        function listenForTyping() {
            onValue(dbRef(db, `rooms/${currentRoom}/typing`), (snapshot) => {
                if (snapshot.exists()) {
                    let currentTypers = [];
                    snapshot.forEach(child => { if (child.key !== myName && child.val() === true) currentTypers.push(child.key); });
                    if (currentTypers.length > 0) typingIndicator.innerHTML = `${currentTypers.join(', ')} is typing...`;
                    else typingIndicator.innerHTML = ''; 
                } else { typingIndicator.innerHTML = ''; }
            });
        }

        // --- IMAGES ---
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 400; let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    messageInput.placeholder = "📷 Image attached!";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- HOLD TO TALK VOICE NOTES ---
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const startRecording = async (e) => {
            e.preventDefault(); 
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = async (event) => { await sendAudioMessage(event.target.result); };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording-active');
                messageInput.placeholder = "🔴 Recording... Release to send";
            } catch (err) { alert("Mic access needed!"); }
        };

        const stopRecording = (e) => {
            e.preventDefault();
            if (isRecording && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording-active');
                messageInput.placeholder = "Message...";
            }
        };

        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
        micBtn.addEventListener('touchstart', startRecording, {passive: false});
        micBtn.addEventListener('touchend', stopRecording, {passive: false});

        async function sendAudioMessage(audioBase64) {
            const msgData = { sender: myName, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), timestamp: Date.now(), audioUrl: audioBase64 };
            await push(dbRef(db, `rooms/${currentRoom}/messages`), msgData);
        }

        // --- TEXT CHAT & DELETE LOGIC ---
        window.handleEnter = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.sendMessage = async () => {
            const text = messageInput.value.trim();
            if (text === "" && !selectedImageBase64) return;
            const msgData = { sender: myName, text: text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), timestamp: Date.now(), imageUrl: selectedImageBase64 || null };
            messageInput.value = ""; messageInput.placeholder = "Message..."; document.getElementById('imageUpload').value = ""; selectedImageBase64 = null;
            set(dbRef(db, `rooms/${currentRoom}/typing/${myName}`), false); clearTimeout(typingTimeout);
            await push(dbRef(db, `rooms/${currentRoom}/messages`), msgData);
        };

        function startChatListening() {
            onChildAdded(dbRef(db, `rooms/${currentRoom}/messages`), (snapshot) => {
                const data = snapshot.val();
                const wrapper = document.createElement('div');
                wrapper.className = data.sender === myName ? "message-wrapper my-msg-wrapper" : "message-wrapper other-msg-wrapper";
                wrapper.id = `msg-${snapshot.key}`; 

                const msgElement = document.createElement('div');
                msgElement.className = data.sender === myName ? "message my-msg" : "message other-msg";
                
                let html = '';
                if (data.sender !== myName) html += `<div class="msg-sender-name">${data.sender}</div>`;
                if (data.imageUrl) html += `<img src="${data.imageUrl}" class="chat-image">`;
                if (data.audioUrl) html += `<audio controls src="${data.audioUrl}" class="chat-audio"></audio>`;
                if (data.text) html += `<div>${data.text}</div>`;
                html += `<span class="timestamp">${data.time}</span>`;
                msgElement.innerHTML = html;

                // --- NEW DELETE LOGIC UI ---
                let deleteHtml = '';
                if (data.sender === myName) {
                    // Senders can delete for themselves or for everyone
                    deleteHtml = `
                        <div class="msg-options">
                            <button title="Delete for Everyone" onclick="deleteForEveryone('${snapshot.key}')">🗑️</button>
                            <button title="Delete for Me" onclick="deleteForMe('${snapshot.key}')">🚫</button>
                        </div>
                    `;
                    wrapper.innerHTML = `${deleteHtml} ${msgElement.outerHTML}`;
                } else if (isAdmin) {
                    // Admins get a special override to wipe any message for everyone
                    deleteHtml = `
                        <div class="msg-options">
                            <button title="Admin Delete" onclick="deleteForEveryone('${snapshot.key}')">🗑️</button>
                        </div>
                    `;
                    wrapper.innerHTML = `${msgElement.outerHTML} ${deleteHtml}`;
                } else {
                    wrapper.innerHTML = `${msgElement.outerHTML}`;
                }
                
                chatBox.appendChild(wrapper); chatBox.scrollTop = chatBox.scrollHeight;
            });
            onChildRemoved(dbRef(db, `rooms/${currentRoom}/messages`), (snapshot) => {
                const el = document.getElementById(`msg-${snapshot.key}`); if (el) el.remove();
            });
        }

        // Deletes from Database (Everyone)
        window.deleteForEveryone = async (key) => { 
            if(confirm("Delete this message for EVERYONE?")) await remove(dbRef(db, `rooms/${currentRoom}/messages/${key}`)); 
        };
        // Deletes from local screen (Just you)
        window.deleteForMe = (key) => {
            if(confirm("Delete this message just for YOU? (Others will still see it)")) {
                const el = document.getElementById(`msg-${key}`); if (el) el.remove();
            }
        };

        window.clearAllMessages = async () => { if(confirm("Wipe room?")) await remove(dbRef(db, `rooms/${currentRoom}/messages`)); };
        window.clearOldMessages = async () => {
            const snap = await get(dbRef(db, `rooms/${currentRoom}/messages`));
            if (snap.exists()) {
                const now = Date.now(); const updates = {};
                snap.forEach(child => { if (now - child.val().timestamp > 3600000) updates[child.key] = null; });
                await update(dbRef(db, `rooms/${currentRoom}/messages`), updates); alert("Old messages deleted.");
            }
        };

        // --- UPGRADED WEB RTC VIDEO LOGIC ---
        let pc, localStream;
        const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        async function setupMedia() {
            document.getElementById('videoArea').style.display = "flex"; 
            callStatus.innerText = "Connecting camera...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 } }, 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                document.getElementById('localVideo').srcObject = localStream;
                callStatus.innerText = "Waiting for other person...";
                
                pc = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                pc.ontrack = (event) => { 
                    document.getElementById('remoteVideo').srcObject = event.streams[0]; 
                    callStatus.innerText = ""; // Hide status when connected
                };

                pc.oniceconnectionstatechange = () => {
                    if(pc.iceConnectionState === 'failed') callStatus.innerText = "Connection Failed (Network Blocked)";
                };
            } catch (err) {
                alert("Camera Error: " + err.message);
                hangup();
            }
        }

        function listenForCalls() {
            onValue(dbRef(db, `rooms/${currentRoom}/videocall/offer`), (snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById('startCallBtn').classList.add('hidden');
                    document.getElementById('answerCallBtn').classList.remove('hidden');
                } else {
                    document.getElementById('answerCallBtn').classList.add('hidden');
                    document.getElementById('startCallBtn').classList.remove('hidden');
                }
            });
        }

        window.startCall = async () => {
            await setupMedia();
            if(!pc) return;
            onDisconnect(dbRef(db, `rooms/${currentRoom}/videocall`)).remove();
            pc.onicecandidate = e => { if(e.candidate) push(dbRef(db, `rooms/${currentRoom}/videocall/callerCands`), e.candidate.toJSON()); };
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            await set(dbRef(db, `rooms/${currentRoom}/videocall/offer`), { sdp: offer.sdp, type: offer.type });
            onValue(dbRef(db, `rooms/${currentRoom}/videocall/answer`), (snap) => { if (!pc.currentRemoteDescription && snap.val()) pc.setRemoteDescription(new RTCSessionDescription(snap.val())); });
            onChildAdded(dbRef(db, `rooms/${currentRoom}/videocall/calleeCands`), (snap) => { pc.addIceCandidate(new RTCIceCandidate(snap.val())); });
        };

        window.answerCall = async () => {
            await setupMedia();
            if(!pc) return;
            pc.onicecandidate = e => { if(e.candidate) push(dbRef(db, `rooms/${currentRoom}/videocall/calleeCands`), e.candidate.toJSON()); };
            const snap = await get(dbRef(db, `rooms/${currentRoom}/videocall/offer`));
            await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            await set(dbRef(db, `rooms/${currentRoom}/videocall/answer`), { sdp: answer.sdp, type: answer.type });
            onChildAdded(dbRef(db, `rooms/${currentRoom}/videocall/callerCands`), (snap) => { pc.addIceCandidate(new RTCIceCandidate(snap.val())); });
        };

        window.hangup = async () => {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(document.getElementById('remoteVideo').srcObject) document.getElementById('remoteVideo').srcObject.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            document.getElementById('videoArea').style.display = "none";
            callStatus.innerText = "";
            await remove(dbRef(db, `rooms/${currentRoom}/videocall`));
        };

        onValue(dbRef(db, `rooms/${currentRoom}/videocall`), (snap) => { if (!snap.exists() && document.getElementById('videoArea').style.display === "flex") hangup(); });
    </script>
</body>
</html>
