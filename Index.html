<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            --text-dark: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            width: 100%;
            max-width: 650px;
            height: 95vh;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Login Screen */
        #loginScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 2rem;
            text-align: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 2rem;
            border-radius: 16px;
            width: 80%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }

        #loginScreen h2 { margin-top: 0; color: var(--primary); }
        
        #loginScreen input {
            padding: 1rem;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 1rem;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        #loginScreen input:focus { border-color: var(--primary); }

        button {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
            transition: all 0.2s;
            width: 100%;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(108, 92, 231, 0.4); }

        .divider {
            margin: 1.5rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            position: relative;
        }
        .divider span {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #f7f9fc;
            padding: 0 10px;
            font-size: 0.8rem;
            color: #888;
            border-radius: 5px;
        }

        /* Chat Screen */
        #chatScreen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .header-buttons button {
            width: auto;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 5px;
        }
        #startCallBtn { background: #00b894; box-shadow: 0 4px 10px rgba(0, 184, 148, 0.3); }
        #answerCallBtn { background: #fdcb6e; animation: pulse 1.5s infinite; color: #2d3436; }
        #hangupBtn { background: #d63031; }

        /* Admin Toolbar */
        #adminToolbar {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            gap: 10px;
            justify-content: center;
        }
        #adminToolbar button {
            width: auto;
            background: #ff7675;
            padding: 5px 12px;
            font-size: 0.8rem;
        }
        #adminToolbar button:hover { background: #d63031; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Video Area */
        #videoArea {
            display: none;
            background: #111;
            padding: 10px;
            justify-content: space-around;
        }

        video {
            width: 48%;
            background: #000;
            border-radius: 12px;
            object-fit: cover;
        }

        /* Chat Box */
        #chatBox {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.3);
        }

        .message-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
        }

        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .msg-sender-name {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .my-msg-wrapper { justify-content: flex-end; }
        .my-msg { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .my-msg .msg-sender-name { color: #dff9fb; }
        .my-msg .timestamp { color: rgba(255,255,255,0.7); }

        .other-msg-wrapper { justify-content: flex-start; }
        .other-msg { background: white; border-bottom-left-radius: 4px; border: 1px solid #eee; }

        .timestamp { font-size: 0.65rem; color: #aaa; text-align: right; margin-top: 5px; display: block; }

        .del-btn {
            background: #ff7675;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 0.7rem;
            cursor: pointer;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            padding: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Input Area */
        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .input-area input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 1rem;
            background: #f8f9fa;
        }
        .input-area input:focus { border-color: var(--primary); background: #fff; }

        .input-area button {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-left: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            font-size: 1.2rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="loginScreen">
            <div class="login-box">
                <h2>✨ Join Chat</h2>
                
                <input type="text" id="guestName" placeholder="Your Name">
                <button onclick="joinGuest()">Enter as Guest</button>
                
                <div class="divider"><span>OR</span></div>
                
                <input type="text" id="adminUser" placeholder="Admin Username">
                <input type="password" id="adminPass" placeholder="Admin Password">
                <button onclick="joinAdmin()" style="background: #2d3436;">Admin Login</button>
                
                <p id="loginError" style="color: #d63031; display: none; font-size: 0.9rem; margin-top: 10px;">Incorrect credentials!</p>
            </div>
        </div>

        <div id="chatScreen">
            <header>
                <div class="header-top">
                    <span>🔒 Private Chat & Video Room</span>
                    <div class="header-buttons">
                        <button id="startCallBtn" onclick="startCall()">🎥 Call</button>
                        <button id="answerCallBtn" onclick="answerCall()" class="hidden">📞 Answer!</button>
                        <button id="hangupBtn" onclick="hangup()" class="hidden">❌ End</button>
                    </div>
                </div>
                <div id="adminToolbar">
                    <button onclick="clearAllMessages()">🗑️ Clear All Chat</button>
                    <button onclick="clearOldMessages()">⏳ Delete > 1 Hour</button>
                </div>
            </header>
            
            <div id="videoArea">
                <video id="localVideo" autoplay muted playsinline></video>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>

            <div id="chatBox"></div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        // Added 'update' and 'onChildRemoved' for the new admin deletion features
        import { getDatabase, ref as dbRef, push, onChildAdded, onChildRemoved, set, get, onValue, remove, update, onDisconnect } 
        from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVKJVGHmoV_h1frjD5AASa_H9BglnVwmw",
            authDomain: "familydictionary6253.firebaseapp.com",
            databaseURL: "https://familydictionary6253-default-rtdb.firebaseio.com",
            projectId: "familydictionary6253",
            storageBucket: "familydictionary6253.firebasestorage.app",
            messagingSenderId: "1051186279461",
            appId: "1:1051186279461:web:808fbc49a821ce51bd7bcc",
            measurementId: "G-90G48CK8RE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Variables
        let myName = "";
        let isAdmin = false;
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        
        // --- AUTHENTICATION LOGIC ---
        window.joinGuest = () => {
            const input = document.getElementById('guestName').value.trim();
            if (input === "") return alert("Please enter your name!");
            myName = input;
            isAdmin = false;
            enterRoom();
        };

        window.joinAdmin = () => {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if (u === 'joyal' && p === '7012') {
                myName = "Joyal (Admin)";
                isAdmin = true;
                document.getElementById('adminToolbar').style.display = "flex";
                enterRoom();
            } else {
                document.getElementById('loginError').style.display = "block";
            }
        };

        function enterRoom() {
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('chatScreen').style.display = "flex";
            startChatListening();
            listenForCalls();
        }

        // --- CHAT LOGIC ---
        window.handleEnter = (e) => { if (e.key === 'Enter') sendMessage(); };

        window.sendMessage = async () => {
            const text = messageInput.value.trim();
            if (text === "") return;
            const now = Date.now();
            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const msgData = { sender: myName, text: text, time: timeString, timestamp: now };
            messageInput.value = "";
            await push(dbRef(db, 'messages'), msgData);
        };

        function startChatListening() {
            // Listen for NEW messages
            onChildAdded(dbRef(db, 'messages'), (snapshot) => {
                const data = snapshot.val();
                const msgKey = snapshot.key;
                
                // Wrapper to hold message and delete button together
                const wrapper = document.createElement('div');
                wrapper.className = data.sender === myName ? "message-wrapper my-msg-wrapper" : "message-wrapper other-msg-wrapper";
                wrapper.id = `msg-${msgKey}`; // Give it an ID so we can remove it later

                // The message bubble
                const msgElement = document.createElement('div');
                msgElement.className = data.sender === myName ? "message my-msg" : "message other-msg";
                
                if (data.sender === myName) {
                    msgElement.innerHTML = `${data.text} <span class="timestamp">${data.time}</span>`;
                } else {
                    msgElement.innerHTML = `<div class="msg-sender-name">${data.sender}</div>${data.text} <span class="timestamp">${data.time}</span>`;
                }

                // Delete Button HTML
                let delBtnHtml = '';
                if (isAdmin) {
                    delBtnHtml = `<button class="del-btn" style="display:flex;" onclick="deleteSpecificMessage('${msgKey}')">🗑️</button>`;
                }

                // Build the UI differently depending on who sent it
                if (data.sender === myName) {
                    wrapper.innerHTML = `${delBtnHtml} ${msgElement.outerHTML}`;
                } else {
                    wrapper.innerHTML = `${msgElement.outerHTML} ${delBtnHtml}`;
                }

                chatBox.appendChild(wrapper);
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            // Listen for DELETED messages (so they vanish from screen)
            onChildRemoved(dbRef(db, 'messages'), (snapshot) => {
                const elementToRemove = document.getElementById(`msg-${snapshot.key}`);
                if (elementToRemove) {
                    elementToRemove.remove();
                }
            });
        }

        // --- ADMIN DELETION LOGIC ---
        window.deleteSpecificMessage = async (key) => {
            if(confirm("Delete this message?")) {
                await remove(dbRef(db, 'messages/' + key));
            }
        };

        window.clearAllMessages = async () => {
            if(confirm("Are you sure you want to completely wipe the chat history?")) {
                await remove(dbRef(db, 'messages'));
            }
        };

        window.clearOldMessages = async () => {
            if(!confirm("Delete all messages older than 1 hour?")) return;
            
            const snapshot = await get(dbRef(db, 'messages'));
            if (snapshot.exists()) {
                const now = Date.now();
                const updates = {};
                let count = 0;
                
                snapshot.forEach(child => {
                    // 3600000 milliseconds = 1 hour
                    if (now - child.val().timestamp > 3600000) {
                        updates[child.key] = null; // Setting to null deletes it
                        count++;
                    }
                });
                
                if (count > 0) {
                    await update(dbRef(db, 'messages'), updates);
                    alert(`Deleted ${count} old messages.`);
                } else {
                    alert("No messages older than 1 hour found!");
                }
            }
        };


        // --- VIDEO CALL LOGIC (WebRTC) ---
        let pc, localStream, remoteStream;
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        async function setupMediaAndConnection() {
            document.getElementById('videoArea').style.display = "flex";
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;

            pc = new RTCPeerConnection(rtcConfig);
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = (event) => event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
        }

        function listenForCalls() {
            onValue(dbRef(db, 'videocall/offer'), (snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById('startCallBtn').classList.add('hidden');
                    document.getElementById('answerCallBtn').classList.remove('hidden');
                } else {
                    document.getElementById('answerCallBtn').classList.add('hidden');
                    document.getElementById('startCallBtn').classList.remove('hidden');
                }
            });
        }

        window.startCall = async () => {
            document.getElementById('startCallBtn').classList.add('hidden');
            document.getElementById('hangupBtn').classList.remove('hidden');
            
            await setupMediaAndConnection();
            onDisconnect(dbRef(db, 'videocall')).remove();

            pc.onicecandidate = event => { if(event.candidate) push(dbRef(db, 'videocall/callerCandidates'), event.candidate.toJSON()); };
            
            const offerDescription = await pc.createOffer();
            await pc.setLocalDescription(offerDescription);
            await set(dbRef(db, 'videocall/offer'), { sdp: offerDescription.sdp, type: offerDescription.type });

            onValue(dbRef(db, 'videocall/answer'), (snapshot) => {
                const data = snapshot.val();
                if (!pc.currentRemoteDescription && data) pc.setRemoteDescription(new RTCSessionDescription(data));
            });

            onChildAdded(dbRef(db, 'videocall/calleeCandidates'), (snapshot) => {
                pc.addIceCandidate(new RTCIceCandidate(snapshot.val()));
            });
        };

        window.answerCall = async () => {
            document.getElementById('answerCallBtn').classList.add('hidden');
            document.getElementById('hangupBtn').classList.remove('hidden');

            await setupMediaAndConnection();

            pc.onicecandidate = event => { if(event.candidate) push(dbRef(db, 'videocall/calleeCandidates'), event.candidate.toJSON()); };

            const offerSnapshot = await get(dbRef(db, 'videocall/offer'));
            await pc.setRemoteDescription(new RTCSessionDescription(offerSnapshot.val()));

            const answerDescription = await pc.createAnswer();
            await pc.setLocalDescription(answerDescription);
            await set(dbRef(db, 'videocall/answer'), { sdp: answerDescription.sdp, type: answerDescription.type });

            onChildAdded(dbRef(db, 'videocall/callerCandidates'), (snapshot) => {
                pc.addIceCandidate(new RTCIceCandidate(snapshot.val()));
            });
        };

        window.hangup = async () => {
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            if(remoteStream) remoteStream.getTracks().forEach(track => track.stop());
            if(pc) pc.close();

            document.getElementById('videoArea').style.display = "none";
            document.getElementById('hangupBtn').classList.add('hidden');
            document.getElementById('startCallBtn').classList.remove('hidden');
            await remove(dbRef(db, 'videocall'));
        };

        onValue(dbRef(db, 'videocall'), (snapshot) => {
            if (!snapshot.exists() && document.getElementById('hangupBtn').className !== "hidden") hangup();
        });

    </script>
</body>
</html>
